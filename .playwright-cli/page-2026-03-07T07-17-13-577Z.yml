                  - generic [ref=f1e76]:
                    - paragraph [ref=f1e77]:
                      - generic [ref=f1e79]: 回答
                      - generic [ref=f1e80] [cursor=pointer]: BioCloudHub
                    - list [ref=f1e81]:
                      - listitem [ref=f1e82]:
                        - strong [ref=f1e83]: 工序目的：
                        - text: 抗体纯化的精纯步骤，去除 HCP、脱落的 ProteinA、抗体聚集体、片段及其他异构体。
                      - listitem [ref=f1e84]:
                        - strong [ref=f1e85]: 方法原理：
                        - text: 离子交换层析应用最为广泛，目标物质和带相反电荷的介质以静电力的作用结合，然后在用高离子或改变 pH 的方式进行洗脱。蛋白的 pI 表征的是蛋白表面的净电荷，然而离子交换层析时是蛋白的局部电荷和介质作用，另外离子交换介质吸附的一类物质，如阳离子交换介质吸附带正电荷的物质，所以在纯化过程中，需要配合层析过程进来合理的结合及洗脱过程，才能达到预期的结果。由于大多数蛋白等电点大于 7，故在溶液中带负电荷，阳离子层析通常采用结合-洗脱模式，能对杂质进行有效去除，并能获得高的蛋白纯化收率。
                      - listitem [ref=f1e86]:
                        - strong [ref=f1e87]: 中间体控制：
                        - text: 对上样载量、上样 pH、洗脱 pH、收集 AU 进行控制。检测蛋白浓度、SEC、CEX、糖型、HCP、HCD、CE、细菌内毒素、微生物限度，其检测项可根据每个企业的要求不同而有所变化。阳离子交换与 ProteinA 相比的最大优势是成本。离子交换介质价格仅为 ProteinA 的 1/10，可重复使用百次以上，并耐受强碱清洗。另外，阳离子交换介质的抗体载量可达 100g/L，是 ProteinA 的 2-5 倍，可降低介质使用量。阳离子交换与 ProteinA 相比有两个劣势，一个是特异性差，另一个是通用性差，需针对不同抗体和抗体表达工艺进行优化，如不同抗体的等电点不同。即使是同一抗体，不同的翻译后修饰也造成不同的等电点，这些都影响到阳离子交换缓冲液 pH 的选择。 阳离子工艺参数评估 Parameter Range Studied Classification Rationale Control strategy Protein load (g/L resin) 10-30 WC-CPP Higher load challenges will decrease resolution and increase levels of aggregate and HCP Batch procedures, skid pump control Load (wash) conductivity (mS/cm) 3-7 WC-CPP Decrease in load conductivity is able to clear HCP, but is well controlled and has an established range Batch procedures Elution pH 6.0 ± 0.2 WC-CPP Elution pH affects both yield and distribution of impurities, but is well controlled Batch procedures Elution stop collect 6.0 ± 0.2 WC-CPP Extended stop collect leads to more increased aggregate levels in pool, but is well controlled Skid control Elution flow rate (cm/hr) 200 ± 100 GPP High flow rate affects yield and impurity impact on aggregate, as well as control Skid control Bed Height (cm) 20 ± 10 GPP Bed height affects packing and has minimal effect on residence time Skid control Equi/load / Wash flow rate (cm/hr) 200 ± 100 GPP Flow rate has previously been shown to have no significant effect on performance Skid control Load pH 5.0 ± 0.5 GPP No significant impact across range, which is well controlled Batch procedures Temperature (°C) 4-40 ± 0.2 GPP Temperature has no significant impact on process performance Facility HVAC control Elution start collect conductivity (mS/cm) 8.5 ± 2.0 ascending GPP Acidic charge variants elute at front of peak, early start has minimal impact on the non-CQA Skid control Elution conductivity (mS/cm) 8.5 ± 2.0 GPP Elution conductivity across range has no significant impact Batch procedures
                  - heading "Q27. 步骤十：阴离子层析" [level=2] [ref=f1e88]:
                    - link "Q27. 步骤十：阴离子层析" [ref=f1e89] [cursor=pointer]:
                      - /url: "#q27-步骤十-阴离子层析"
                  - generic [ref=f1e90]:
                    - paragraph [ref=f1e91]:
                      - generic [ref=f1e93]: 回答
                      - generic [ref=f1e94] [cursor=pointer]: BioCloudHub
                    - list [ref=f1e95]:
                      - listitem [ref=f1e96]:
                        - strong [ref=f1e97]: 工序目的：
                        - text: 抗体纯化的精纯步骤，去除 HCP、脱落的 ProteinA、抗体聚集体、片段及其他异构体、病毒、HCD、内毒等杂质。
                      - listitem [ref=f1e98]:
                        - strong [ref=f1e99]: 方法原理：
                        - text: 阴离子和阳离子交换的区分在于介质上的活性基团，阴离子交换介质上的活性基团为阳性（带正电荷），可吸附流动相中的阴性离子，阳离子交换介质上的活性基团为阴性（带负电荷），可吸附流动相中的阳性离子。活性基团还可进一步分为强活性基团和弱活性基团，区分的标准是活性基团上所带电荷是恒定的还是随 pH 改变的。由于大多数蛋白等电点大于 7，故在溶液中带负电荷，阴离子层析通常采用流穿模式，能对杂质进行有效去除，并能获得高的蛋白纯化收率。
                      - listitem [ref=f1e100]:
                        - strong [ref=f1e101]: 中间体控制：
                        - text: 对上样载量、上样 pH、洗脱 pH、收集 AU 进行控制。检测蛋白浓度、SEC、CEX、糖型、HCP、HCD、CE、细菌内毒素、微生物限度、病毒，其检测项可根据每个企业的要求不同而有所变化。离子交换是最常见的精纯步骤。经典的抗体纯化步骤采用流穿的阴离子交换和结合-洗脱的阳离子交换两步精纯。阴离子交换对宿主细胞核酸和宿主细胞蛋白有很好的清除作用，而阳离子交换是去除多聚体和抗体片段的有效步骤。离子交换依靠抗体和杂质表面所带电荷差异将其分离。抗体的电荷来自多个组成部分。赖氨酸、精氨酸、组氨酸可带负电荷，天冬氨酸、谷氨酸、半胱氨酸可带正电荷，N-端的氨基可带正电荷，C-端的竣基可带负电荷，糖基化上唾液酸可带负电荷。
                  - heading "Q28. 步骤十二：浓缩换液" [level=2] [ref=f1e102]:
                    - link "Q28. 步骤十二：浓缩换液" [ref=f1e103] [cursor=pointer]:
                      - /url: "#q28-步骤十二-浓缩换液"
                  - generic [ref=f1e104]:
                    - paragraph [ref=f1e105]:
                      - generic [ref=f1e107]: 回答
                      - generic [ref=f1e108] [cursor=pointer]: BioCloudHub
                    - list [ref=f1e109]:
                      - listitem [ref=f1e110]:
                        - strong [ref=f1e111]: 工序目的：
                        - text: 浓缩蛋白和置换缓冲体系，以达到制剂的想要的浓度和缓冲体系。
                      - listitem [ref=f1e112]:
                        - strong [ref=f1e113]: 方法原理：
                        - text: 截留的原理，基于分子大小的原理，蛋白分子较大、和缓冲体系溶液的分子小，可采用膜过滤来截留蛋白，从而置换换缓冲体系。
                      - listitem [ref=f1e114]:
                        - strong [ref=f1e115]: 中间体控制：
                        - text: 对过滤压力、蛋白浓度进行控制。检测蛋白浓度、SEC、细菌内毒素、微生物限度、病毒，其检测项可根据每个企业的要求不同而有所变化。经过该步骤通常将蛋白浓度到相应的制剂浓度和制剂缓冲体系，以方便后续直接灌装，减少中间过程的
                        - mark [ref=f1e116]: 操作
                        - text: 程序。过滤后的原液储存在低温冰箱中。
                  - heading "Q29. 深层过滤的应用" [level=2] [ref=f1e117]:
                    - link "Q29. 深层过滤的应用" [ref=f1e118] [cursor=pointer]:
                      - /url: "#q29-深层过滤的应用"
                  - generic [ref=f1e119]:
                    - paragraph [ref=f1e120]:
                      - generic [ref=f1e122]: 回答
                      - generic [ref=f1e123] [cursor=pointer]: BioCloudHub
                    - list [ref=f1e124]:
                      - listitem [ref=f1e125]:
                        - strong [ref=f1e126]: 应用：
                        - text: 随着制药领域的迅猛发展，作为工艺中的关键质量控制点之一，深层过滤分离技术和产品，生物制品发酵液和细胞培养液的澄清，血液制品的固液分离，小分子药物的内毒素降低，脱色除味的工艺环节中得到广泛的应用。 深层过滤通常被用于预过滤，如发酵液澄清、去除细胞碎片和 DNA、血液制品和其他生物制品中的预处理等。
                      - listitem [ref=f1e127]:
                        - strong [ref=f1e128]: 粒径排阻：
                        - text: 病毒大于滤膜孔径，产品穿过滤膜而病毒被滞留。
                      - listitem [ref=f1e129]:
                        - strong [ref=f1e130]: 吸附机理：
                        - text: 对于尺寸小于膜孔的病毒，通过电荷、范德华、氢键等作用力捕获病毒。
                      - listitem [ref=f1e131]:
                        - strong [ref=f1e132]: 去除能力：
                        - text: 深层过滤介质中含有硅藻土，硅藻土在抗体纯化条件下带正电荷，在去除细胞和细胞碎片的情况下，还
                        - mark [ref=f1e133]: 可以
                        - text: 去除部分带负电荷的宿主细胞核酸和宿主细胞蛋白质，起到初步纯化的作用，应用好深层过滤步骤将大大降低下游纯化的难度。
                  - heading "Q30. 深层过滤机理" [level=2] [ref=f1e134]:
                    - link "Q30. 深层过滤机理" [ref=f1e135] [cursor=pointer]:
                      - /url: "#q30-深层过滤机理"
                  - generic [ref=f1e136]:
                    - paragraph [ref=f1e137]:
                      - generic [ref=f1e139]: 回答
                      - generic [ref=f1e140] [cursor=pointer]: BioCloudHub
                    - list [ref=f1e141]:
                      - listitem [ref=f1e142]:
                        - strong [ref=f1e143]: 机理：
                        - text: 深层过滤器主要以纤维素纤维加硅藻土等助滤剂做过滤介质。 纤维素组成了滤芯中的网状结构，纤维之间的空隙用于捕捉料液中的颗粒，随着过滤的进行，颗粒堆积在表面形成滤饼，会提高过滤的效率。同时随着滤饼越来越厚，也会降低过滤速度。 在纤维中加入硅藻土，
                        - mark [ref=f1e144]: 可以
                        - text: 提高在形成滤饼后的过滤速度。肉眼观察硅藻土是非常细小的颗粒，在放大电镜下，
                        - mark [ref=f1e145]: 可以
                        - text: 看到它表明有很多亚微米的空隙，
                        - mark [ref=f1e146]: 可以
                        - text: 拦截细小颗粒。 深层过滤介质的第三个组分是树脂，它有 2 方面作用，一是粘结纤维，二是提供过滤介质表面的正电荷。这些正电荷
                        - mark [ref=f1e147]: 可以
                        - text: 吸附带负电、比过滤孔径小很多的细胞碎片等杂质。因此，悬浊液在通过过滤介质时，固体颗粒物被随机吸附或截留在这些孔隙中，即微孔截留、电荷吸附。
                  - heading "Q31. 深层过滤与表型过滤的区别" [level=2] [ref=f1e148]:
                    - link "Q31. 深层过滤与表型过滤的区别" [ref=f1e149] [cursor=pointer]:
                      - /url: "#q31-深层过滤与表型过滤的区别"
                  - generic [ref=f1e150]:
                    - paragraph [ref=f1e151]:
                      - generic [ref=f1e153]: 回答
                      - generic [ref=f1e154] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e155]: 深层过滤滤膜一般为可透性材料，内部具有大量的半通孔及贯通孔。它的过滤作用机理发生在整个膜厚度上。一部分污物粒子被阻挡在近介质上游的表面，一些较小的粒子进入过滤介质内部，在收缩、膨胀、应力效应等作用下吸附在孔壁中，或因桥架、流体方向改变引起沉积得到滤除。因此，深层型过滤介质的纳污容量较大，过滤效果较表面型过滤介质表现更好，寿命也较长。
                  - heading "Q32. 深层过滤器优缺点" [level=2] [ref=f1e156]:
                    - link "Q32. 深层过滤器优缺点" [ref=f1e157] [cursor=pointer]:
                      - /url: "#q32-深层过滤器优缺点"
                  - generic [ref=f1e158]:
                    - paragraph [ref=f1e159]:
                      - generic [ref=f1e161]: 回答
                      - generic [ref=f1e162] [cursor=pointer]: BioCloudHub
                    - list [ref=f1e163]:
                      - listitem [ref=f1e164]:
                        - strong [ref=f1e165]: 传统深层过滤：
                        - text: 传统深层过滤器的材质通常来源于天然产物，如硅藻土和纤维素等等。这些材质在实际生产过程会有一些溶出物（如 β-葡聚糖等）析出在料液中，从而可能会对产品的杂质水平以及内毒素的检测产生影响。因此，有些供应商开发了全人工合成材质的深层过滤器（如密理博公司的 Millistak+ HC Pro 系列），以降低工艺过程中浸出物等杂质的产生。
                      - listitem [ref=f1e166]:
                        - strong [ref=f1e167]: 优点：
                        - text: 深层过滤是目前应用最广泛的一种收获手段，
                        - mark [ref=f1e168]: 可以
                        - text: 处理从几百毫升到几千升的样品。深层过滤的可放大性也是几种收获技术里面最好的。深层过滤所需的设备投入通常要小很多。而且由于一些助滤剂的加入，使得深层过滤
                        - mark [ref=f1e169]: 可以
                        - text: 去除一些可溶性的杂质，从而降低后续纯化步骤的压力。
                      - listitem [ref=f1e170]:
                        - strong [ref=f1e171]: 缺点：
                        - text: 在培养规模大于 5000L 时，耗材的成本大幅增加，使得总成本大于 DSC 等其他技术。同时由于在大规模培养时需要大量的深层滤膜，深层滤膜的储存、运输、安装以及废物处理均需要大量的人力以及
                        - mark [ref=f1e172]: 空间
                        - text: 。因此，深层过滤适用于培养规模较低（如低于 2000L）时的收获。
                  - heading "Q33. 过滤工艺的设计" [level=2] [ref=f1e173]:
                    - link "Q33. 过滤工艺的设计" [ref=f1e174] [cursor=pointer]:
                      - /url: "#q33-过滤工艺的设计"
                  - generic [ref=f1e175]:
                    - paragraph [ref=f1e176]:
                      - generic [ref=f1e178]: 回答
                      - generic [ref=f1e179] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e180]: 1 过滤工艺设计时，应根据待过滤介质属性及工艺目的，选择合适的过滤器并确定过程参数。除菌过滤工艺应根据工艺目的，选用 0.22 微米（更小孔径或相同过滤效力）的除菌级过滤器。0.1 微米的除菌级过滤器通常用于支原体的去除。 2 对无菌药品生产的全过程进行微生物控制，避免微生物污染。最终除菌过滤前，待过滤介质的微生物污染水平一般小于等于 10cfu/100ml。 3 选择过滤器材质时，应充分考察其与待过滤介质的兼容性。过滤器不得因与产品发生反应、释放物质或吸附作用而对产品质量产生不利影响。除菌过滤器不得脱落纤维，严禁使用含有石棉的过滤器。合理的过滤膜面积需要经过科学的方法评估后得出。面积过大可能导致产品收率下降、过滤成本上升；过滤面积过小可能导致过滤时间延长、中途堵塞甚至产品报废。 4 应注意过滤系统结构的合理性，避免存在卫生死角。过滤器进出口存在一定的限流作用。应根据工艺需要，选择合适的进出口大小。选择过滤器时，应根据实际工艺要求，确定过滤温度范围、最长过滤时间、过滤流速、灭菌条件、进出口压差范围或过滤流速范围等工艺参数，并确认这些参数是否在可承受范围内。 5 药品生产企业在选择除菌过滤器供应商时，应审核供应商提供的验证文件和质量证书，确保选择的过滤器是除菌级过滤器。药品生产企业应将除菌过滤器厂家作为供应商进行管理，例如进行文件审计或工厂现场审计、质量协议和产品变更控制协议的签订等。
                  - heading "Q34. 过滤系统的设计" [level=2] [ref=f1e181]:
                    - link "Q34. 过滤系统的设计" [ref=f1e182] [cursor=pointer]:
                      - /url: "#q34-过滤系统的设计"
                  - generic [ref=f1e183]:
                    - paragraph [ref=f1e184]:
                      - generic [ref=f1e186]: 回答
                      - generic [ref=f1e187] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e188]:
                      - text: 1 在设计除菌过滤系统时，应充分认识除菌过滤工艺的局限性。由于除菌过滤器不能将病毒或支原体全部滤除，可采用热处理等方法来弥补除菌过滤的不足。 2 尽可能采取措施降低过滤除菌的风险，例如宜安装第二只已灭菌的除菌过滤器，最终的除菌过滤滤器应当尽可能接近灌装点。通常通过两个或以上相同或递减孔径的过滤方式，统称为序列过滤。序列过滤系统中，如果在最终除菌过滤器前增加一个除菌级过滤器，并且确保两个过滤器之间无菌，以及控制过滤前介质的微生物污染水平一般小于等于 10cfu/100ml，这种情况下称为冗余过滤系统。冗余过滤系统中，接近灌装点的过滤器称为主过滤器，其前端的过滤器则称为冗余过滤器。冗余过滤系统使用后，如果主过滤器完整性测试通过，则冗余过滤器不需要进行完整性测试；如果主过滤器完整性测试失败，冗余过滤器必须通过完整性测试。另一种序列过滤系统是指在过滤工艺中经过验证需要一系列（两个或以上）的除菌级过滤器才能达到除菌效果的系统，那么这一系列的过滤器被认为是一个除菌单元，在使用后必须全部通过完整性测试。 3 过滤器位置设计时应该考虑有菌气体或液体的释放，并且根据产品批量、管路长短、安装和灭菌方便性等，确认过滤器安装的区域和位置。过滤系统设计时，应考虑过滤器完整性测试的方便性及其给系统带来的微生物污染风险。过滤器灭菌后，接触其下游系统的气体和冲洗液体必须是无菌的。 4 除菌过滤系统设计时，应充分考虑系统灭菌的安全性和方便性。使用在线灭菌方式时，应考虑系统内冷空气及冷凝水的排放问题，从而保证系统温度最低点也能达到预期的 F0 值。采用离线方法灭菌时，应充分考虑转移和安装过程的风险。例如：应注意气流方向，
                      - mark [ref=f1e189]: 操作
                      - text: 人员的无菌
                      - mark [ref=f1e190]: 操作
                      - text: 过程，以及可考虑无菌连接器等连接方案。 5 若采用一次性过滤系统且需进行使用前完整性测试或预冲洗，在设计时需额外考虑如下因素：上游连接管路的耐压性、下游的无菌性、下游能提供足够的
                      - mark [ref=f1e191]: 空间
                      - text: （比如安装除菌级屏障过滤器或相应体积的无菌袋）进行排气排水。如果使用一次性无菌连接装置，应有文件证明不会有微生物进入污染的风险。
                  - heading "Q35. 除菌过滤验证概述" [level=2] [ref=f1e192]:
                    - link "Q35. 除菌过滤验证概述" [ref=f1e193] [cursor=pointer]:
                      - /url: "#q35-除菌过滤验证概述"
                  - generic [ref=f1e194]:
                    - paragraph [ref=f1e195]:
                      - generic [ref=f1e197]: 回答
                      - generic [ref=f1e198] [cursor=pointer]: BioCloudHub
                    - list [ref=f1e199]:
                      - listitem [ref=f1e200]:
                        - strong [ref=f1e201]: A：
                        - text: 方法如下
                    - paragraph [ref=f1e202]:
                      - text: 1 除菌过滤器本身的性能确认一般由过滤器生产商完成，主要的确认项目包括微生物截留测试、完整性测试、生物安全测试（毒性测试和内毒素测试）、流速测试、水压测试、多次灭菌测试、可提取物测试、颗粒物释放测试和纤维脱落测试等。 2 过滤工艺验证是指针对具体的待过滤介质，结合特定的工艺条件而实施的验证过程，一般包括细菌截留试验、化学兼容性试验、可提取物或浸出物试验、安全性评估和吸附评估等内容。如果过滤后，以产品作为润湿介质进行完整性测试，还应进行相关的产品完整性测试验证。除菌过滤工艺验证
                      - mark [ref=f1e203]: 可以
                      - text: 由过滤器的使用者或委托试验检测机构（例如：过滤器的生产者或第三方试验室）完成，但过滤器使用者应最终保证实际生产过程中
                      - mark [ref=f1e204]: 操作
                      - text: 参数和允许的极值在验证时已被覆盖，并有相应证明文件。 3 不同过滤器生产商的验证文件一般是不能相互替代的，同一生产商的同一材质的除菌过滤验证文件往往也不能直接互换，除非有合理的声明或文件支持。如果在生产过程中有两个或以上不同生产商提供同一材质或者不同材质的过滤器，或同一生产商的同一材质（不同的成膜工艺）的过滤器，验证应该分别进行。
                  - heading "Q36. 除菌过滤器、系统的使用" [level=2] [ref=f1e205]:
                    - link "Q36. 除菌过滤器、系统的使用" [ref=f1e206] [cursor=pointer]:
                      - /url: "#q36-除菌过滤器、系统的使用"
                  - generic [ref=f1e207]:
                    - paragraph [ref=f1e208]:
                      - generic [ref=f1e210]: 回答
                      - generic [ref=f1e211] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e212]:
                      - text: 1 过滤器安放位置应便于其安装、拆卸、检测等
                      - mark [ref=f1e213]: 操作
                      - text: 并且不能影响其使用功能。过滤器与支撑过滤器的设备、地面、墙面等连接应牢固可靠。过滤器各部件间应接合紧密，密封良好，能够耐受生产
                      - mark [ref=f1e214]: 操作
                      - text: 压力，且无泄漏、变形。滤器、滤膜安装前应确认其规格、型号、外观符合要求。组装过程中，应尽量避免污染。应按照滤器的使用说明进行安装。如果现场有多种规格滤器时，应有第二人对滤器信息进行复核确认，复核应有记录。 2 为了减少滤器产生的颗粒及其他异物影响产品，可对安装好的除菌过滤系统进行必要的预冲洗。应结合供应商提供的方法进行冲洗。冲洗方法应经过验证。在正常
                      - mark [ref=f1e215]: 操作
                      - text: 时，冲洗量应不低于验证的最低冲洗量。冲洗后应采用适当方法排除冲洗液。 3 除菌过滤系统应进行风险评估，尽量进行密闭性确认。过滤器上游系统密闭性可通过压力保持和在线完整性测试等方式确认。过滤器下游密闭性可通过压力保持进行确认，相关参数应经过验证。 4 除菌过滤应在规定的工艺控制参数范围内进行，为保证除菌过滤的有效性，应对影响除菌过滤效果的关键参数进行控制和记录。控制项目应包括除菌过滤温度、时间、压力、上下游压差等；系统的灭菌参数、无菌接收容器的灭菌参数；以及过滤器完整性测试结果等。除了过程参数，还应对滤器的关键信息进行记录（如：货号、批号和序列号，或其他唯一识别号），以利追溯。 5 应制定企业的培训计划，除菌过滤器的相关培训应纳入培训计划中。培训内容包括理论知识及
                      - mark [ref=f1e216]: 操作
                      - text: 技能。理论知识培训包括滤器生产商提供的使用说明、工作原理、相关参数及滤芯、过滤系统相关验证要求；
                      - mark [ref=f1e217]: 操作
                      - text: 技能培训包括相关滤芯使用的标准
                      - mark [ref=f1e218]: 操作
                      - text: 规程，如完整性测试培训、清洗灭菌、干燥、保存等
                      - mark [ref=f1e219]: 操作
                      - text: 培训、产品除菌过滤工艺培训、系统密闭性测试培训等。应对人员进行理论和实际
                      - mark [ref=f1e220]: 操作
                      - text: 考核，考核合格后上岗。当系统或参数发生变更，相关的标准
                      - mark [ref=f1e221]: 操作
                      - text: 规程内容修订后，应对人员进行再培训。 6 除菌过滤工艺过程发生偏差时，应进行深入的调查，以找到根本原因并采取纠偏措施。对发生偏差的产品应进行风险评估。
                  - heading "Q37. 减菌过滤工艺" [level=2] [ref=f1e222]:
                    - link "Q37. 减菌过滤工艺" [ref=f1e223] [cursor=pointer]:
                      - /url: "#q37-减菌过滤工艺"
                  - generic [ref=f1e224]:
                    - paragraph [ref=f1e225]:
                      - generic [ref=f1e227]: 回答
                      - generic [ref=f1e228] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e229]:
                      - text: 1 相对于除菌过滤，减菌过滤是通过过滤的方法将待过滤介质中的微生物污染水平下降到可接受程度的过滤工艺。 2 减菌过滤通常设计在：终端灭菌工艺生产的无菌制剂的灌装前端，或非最终灭菌工艺生产的无菌制剂的除菌过滤工序前端。减菌过滤的目的是使产品最终灭菌前或除菌过滤前的微生物污染水平符合预期。 3 减菌过滤系统应采用孔径 0.45 微米或 0.22（或以下）微米的过滤器，以获得可接受的微生物污染水平。过滤系统的设计应以工艺参数和结果可控为目标，综合考虑：过滤器的尺寸、过滤药液量、过滤时间、过滤压差、药液的接收和储存的方式和时间等要素。由于过滤前后的药液是非无菌的，设计时应注意药液中微生物污染水平的变化。 4 应通过验证来确认减菌过滤器不会对药液产生负面影响。减菌过滤工艺的验证可作为产品工艺验证的一部分。 5 减菌过滤的正常运行是保证产品最终灭菌前（或除菌过滤前）的微生物污染水平符合可接受程度的重要措施。减菌过滤工艺验证应包括化学兼容性、可提取物/浸出物及吸附等。应建立相应的标准
                      - mark [ref=f1e230]: 操作
                      - text: 规程来规范过滤器的使用，如安装、系统连接、消毒或灭菌、完整性测试等
                      - mark [ref=f1e231]: 操作
                      - text: ；应制定减菌过滤工艺的关键工艺参数，如过滤压差、过滤时间等。 6 重复使用过滤器滤芯时，也应进行清洗效果，最多灭菌（或消毒）次数等验证等。重复使用滤芯应对待过滤介质无不良影响，不增加产品污染和交叉污染的风险。重复使用的滤芯不得用于不同种类的产品，应制定标准
                      - mark [ref=f1e232]: 操作
                      - text: 规程管理重复使用滤芯的清洗、灭菌、储存、标识等重要事项。
                  - heading "Q38. 常用的层析技术介绍" [level=2] [ref=f1e233]:
                    - link "Q38. 常用的层析技术介绍" [ref=f1e234] [cursor=pointer]:
                      - /url: "#q38-常用的层析技术介绍"
                  - generic [ref=f1e235]:
                    - paragraph [ref=f1e236]:
                      - generic [ref=f1e238]: 回答
                      - generic [ref=f1e239] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e240]: "A: 如下"
                    - paragraph [ref=f1e241]:
                      - text: 凝胶过滤层析 凝胶过滤层析法又称为排阻层析或分子筛方法，主要是根据蛋白质的大小和形状，即蛋白质的质量进行分离和纯化。层析柱中的填料是某些惰性的多孔网状结构物质，多是交联的聚糖（如葡聚糖或琼脂糖）类物质，使蛋白质混合物中的物质按分子大小的不同进行分离。也叫做分子排阻层析。一种利用带孔凝胶珠作基质，按照分子大小分离蛋白质或其它分子混合物的层析技术。一般是大分子先流出来，小分子后流出来。 亲和层析 亲和色谱也称为亲和层析，是一种利用固定相的结合特性来分离分子的色谱方法。亲和色谱在凝胶过滤色谱柱上连接与待分离的物质有一定结合能力的分子，并且它们的结合是
                      - mark [ref=f1e242]: 可逆
                      - text: 的，在改变流动相条件时二者还能相互分离。亲和色谱
                      - mark [ref=f1e243]: 可以
                      - text: 用来从混合物中纯化或浓缩某一分子，也
                      - mark [ref=f1e244]: 可以
                      - text: 用来去除或减少混合物中某一分子的含量。 离子交换层析 离子交换层析分离蛋白质是根据在一定 pH 条件下，蛋白质所带电荷不同而进行的分离方法。常用于蛋白质分离的离子交换剂有弱酸型的羧甲基纤维素(CM 纤维素)和弱碱型的二乙基氨基乙基纤维素(DEAE 纤维素)。前者为阳离子交换剂，后者为阴离子交换剂。离子交换层析中，基质是由带有电荷的树脂或纤维素组成。带有负电荷的称之阳离子交换树脂；而带有正电荷的称之阴离子树脂。离子交换层析同样
                      - mark [ref=f1e245]: 可以
                      - text: 用于蛋白质的分离纯化。由于蛋白质也有等电点，当蛋白质处于不同的 pH 条件下，其带电状况也不同。阴离子交换基质结合带有负电荷的蛋白质，所以这类蛋白质被留在柱子上，然后通过提高洗脱液中的盐浓度等措施，将吸附在柱子上的蛋白质洗脱下来。结合较弱的蛋白质首先被洗脱下来。反之阳离子交换基质结合带有正电荷的蛋白质，结合的蛋白
                      - mark [ref=f1e246]: 可以
                      - text: 通过逐步增加洗脱液中的盐浓度或是提高洗脱液的 pH 值洗脱下来。 疏水层析 疏水层析也称疏水作用下层析从分离纯化生命物质的机制来看，也属于吸附层析一类。疏水层析和反相层析分离生命物质的依据是一致的，利用固定相载体上偶联的疏水性配基与流动相中的一些疏水分子发生
                      - mark [ref=f1e247]: 可逆
                      - text: 性结合而进行分离。该方法基于的是蛋白质的疏水差异，在高盐溶液中，蛋白质会与疏水配基相结合，而其他的杂蛋白则没有此种性质，利用此种性质，
                      - mark [ref=f1e248]: 可以
                      - text: 将蛋白质初步的分离，用于盐析之后的蛋白质进一步提纯。 多模式层析 近年来有多家填料供应商开发出多模式填料，目前主流的多模式填料有阳离子+疏水以及阴离子+疏水。多模式层析结合了离子交换高分辨率的同时，结合了疏水层析高耐盐的特性，使得层析过程
                      - mark [ref=f1e249]: 可以
                      - text: 在高盐的条件进行上样，从而有更高的
                      - mark [ref=f1e250]: 可操作空间
                      - text: ，适合复杂样品的纯化。多模式层析填料的筛选应当注意目标产物的疏水性，对于疏水性较高的目标产物容易出现难以洗脱的情况（疏水性较高时，离子力以及疏水力的双重作用使得目标产物与填料结合较为牢固难以洗脱，而采用高盐洗脱时会导致填料的疏水性占主导从而导致收率较低的情况），因此对于疏水性较强的目标产物应当选用配基密度较低的填料，或者在层析过程中添加精氨酸来削弱疏水力进行工艺开发。对于疏水性适中的目标产物则
                      - mark [ref=f1e251]: 可以
                      - text: 通过一系列梯度实验进行填料筛选和工艺开发。
                  - heading "Q39. 抗体药物下游纯化常用的层析技术" [level=2] [ref=f1e252]:
                    - link "Q39. 抗体药物下游纯化常用的层析技术" [ref=f1e253] [cursor=pointer]:
                      - /url: "#q39-抗体药物下游纯化常用的层析技术"
                  - generic [ref=f1e254]:
                    - paragraph [ref=f1e255]:
                      - generic [ref=f1e257]: 回答
                      - generic [ref=f1e258] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e259]: "A: 如下"
                    - paragraph [ref=f1e260]: 概述 针对生物制品的纯化，常用的层析技术主要有亲和层析和离子交换层析。 亲和层析 一般用作抗体捕获，中间纯化阶段，由于其收率高、去除杂质能力强，是抗体纯化中必不可少的一个步骤。常用的亲和层析填料是蛋白 A，其原理和运用详见《抗体药物研发问答 166~170《Protein A 亲和层析》。 离子交换层析 离子交换层析是一种依据目标产物与杂质电荷差异而分离的纯化方式，通常用在目标产物的精纯阶段。根据交换离子的不同可分为阴离子交换层析和阳离子交换层析。根据层析目的的不同，离子交换层析过程可选用两种模式：
                    - list [ref=f1e261]:
                      - listitem [ref=f1e262]:
                        - strong [ref=f1e263]: 流穿模式：
                        - text: 目标产物与填料不结合，而尽量将杂质结合在层析填料上；
                      - listitem [ref=f1e264]:
                        - strong [ref=f1e265]: 结合洗脱模式：
                        - text: 目标产物与填料结合，再使用一定浓度的盐进行洗脱。 选用合适的层析填料以及层析模式，首先就要明确层析目的以及目标产物的等电点 PI（电荷性质），目标产物的 PI
                        - mark [ref=f1e266]: 可以
                        - text: 通过目标产物序列计算获得（理论等电点），也
                        - mark [ref=f1e267]: 可以
                        - text: 通过毛细管等电聚焦电泳（CIEF）来获得（实际等电点）。离子交换层析常用于精纯步骤，
                        - mark [ref=f1e268]: 可以
                        - text: 有效去除聚体、HCD、HCP、内毒等杂质。
                  - heading "Q40. 层析术语基本知识" [level=2] [ref=f1e269]:
                    - link "Q40. 层析术语基本知识" [ref=f1e270] [cursor=pointer]:
                      - /url: "#q40-层析术语基本知识"
                  - generic [ref=f1e271]:
                    - paragraph [ref=f1e272]:
                      - generic [ref=f1e274]: 回答
                      - generic [ref=f1e275] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e276]: "A: 如下"
                    - paragraph [ref=f1e277]: 概述 学习层析之前需要先了解层析相关的基本概念，本文汇总了层析术语如下： 01 -层析相关体积 02 -分辨率 03 -选择性和有效性 04 -柱效 05 -线性流速和体积流速 06 -固定相和流动相 07 -载量
                  - heading "Q41. 01-层析相关体积" [level=2] [ref=f1e278]:
                    - link "Q41. 01-层析相关体积" [ref=f1e279] [cursor=pointer]:
                      - /url: "#q41-01-层析相关体积"
                  - generic [ref=f1e280]:
                    - paragraph [ref=f1e281]:
                      - generic [ref=f1e283]: 回答
                      - generic [ref=f1e284] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e285]: "A: 如下"
                    - paragraph [ref=f1e286]: Vs 固相凝胶的体积 Vo 外水体积 Vi 填料颗粒内径体积 Vc 柱体积。柱体积=固相凝胶的体积+外水体积+填料颗粒内径体积
                  - heading "Q42. 什么是离子交换层析？" [level=2] [ref=f1e287]:
                    - link "Q42. 什么是离子交换层析？" [ref=f1e288] [cursor=pointer]:
                      - /url: "#q42-什么是离子交换层析"
                  - generic [ref=f1e289]:
                    - paragraph [ref=f1e290]:
                      - generic [ref=f1e292]: 回答
                      - generic [ref=f1e293] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e294]:
                      - text: 离子交换层析分离蛋白的原理是基于其净电荷的不同，通过蛋白质与带电荷的固定相之间的静电作用力进行分离。IEX 有以下两类:（1）阴离子交换层析（固定相带正电荷，与带负电的蛋白质相结合）；（2）阳离子交换层析（固定相带负电，与带正电的蛋白质相结合）。离子交换层析常用于蛋白质纯化工艺中期。但是，对某些蛋白，在纯化工艺的前期或后期采用该方法亦可获得良好的分离效果。 由于氨基酸的基本结构和与其共价结合的修饰成分的影响，所有的蛋白质都会带有净电荷。由于溶剂
                      - mark [ref=f1e295]: 可以
                      - text: 与蛋白质相互交换氢离子，因此蛋白质的净电荷受其溶剂 pH 值的影响。蛋白质的等电点（pI）是蛋白质不带电时的 pH 值。当 pH 值高于 pI 时，蛋白质会带负电，而当 pH 值低于 pI 时，蛋白质带正电。因此，
                      - mark [ref=f1e296]: 可以
                      - text: 通过调节溶液的 pH 值来控制结合蛋白是与离子交换柱结合或是从柱上洗脱。
                  - heading "Q43. 离子交换层析在抗体药物生产中的应用" [level=2] [ref=f1e297]:
                    - link "Q43. 离子交换层析在抗体药物生产中的应用" [ref=f1e298] [cursor=pointer]:
                      - /url: "#q43-离子交换层析在抗体药物生产中的应用"
                  - generic [ref=f1e299]:
                    - paragraph [ref=f1e300]:
                      - generic [ref=f1e302]: 回答
                      - generic [ref=f1e303] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e304]: 离子交换层析应用最为广泛，目标物质和带相反电荷的介质以静电力的作用结合，然后在用高离子或改变 pH 的方式进行洗脱。特别要注意，蛋白的 pI 表征的是蛋白表面的净电荷，然而离子交换层析时是蛋白的局部电荷和介质作用，另外离子交换介质吸附的一类物质，如阳离子交换介质吸附带正电荷的物质，所以在纯化过程中，需要配合层析过程进来合理的结合及洗脱过程，才能达到预期的结果。 阳离子交换是另一个较常用的抗体捕获方法。目前至少有 4 个（Humira、Synagis、Soliris、
                  - heading "Q44. 阳离子交换层析" [level=2] [ref=f1e305]:
                    - link "Q44. 阳离子交换层析" [ref=f1e306] [cursor=pointer]:
                      - /url: "#q44-阳离子交换层析"
                  - generic [ref=f1e307]:
                    - paragraph [ref=f1e308]:
                      - generic [ref=f1e310]: 回答
                      - generic [ref=f1e311] [cursor=pointer]: BioCloudHub
                    - list [ref=f1e312]:
                      - listitem [ref=f1e313]:
                        - strong [ref=f1e314]: 阳离子交换剂带负电荷，与混合物中带正电的组分结合阳离子交换层析。常用的阳离子交换剂：
                        - text: 磺酸甲酯（S，强阳离子交换基团）和羧甲基（CM，弱阳离子交换基团）。 在抗体纯化过程中，阳离子交换层析采用结合洗脱的方式进行，即将蛋白结合在阳离子交换基团上，让液体流穿。然后通过改变条件以改变电荷洗脱蛋白。
                        - mark [ref=f1e315]: 可以
                        - text: 有效去除 HCP、内毒、聚体等杂质。除了作为抗体纯化精纯步骤外，还
                        - mark [ref=f1e316]: 可以
                        - text: 作为捕获步骤。
                      - listitem [ref=f1e317]:
                        - strong [ref=f1e318]: 补充知识：
                        - text: 1）强离子交换基团的活性基团在很大的 pH 范围内均可保持带电，它
                        - mark [ref=f1e319]: 可以
                        - text: 在蛋白质结合所需 pH 值是特别强的酸性或碱性的情况下使用（假设该 pH 值下蛋白质稳定性仍得以保持）。有些蛋白质在弱离子交换上的保留较弱，使得它们
                        - mark [ref=f1e320]: 可以
                        - text: 用较低的离子强度洗脱。由于高离子强度会影响部分蛋白质的稳定性，而弱离子交换不需要在极端的 pH 值条件下进行蛋白质的结合，因此可能对蛋白质更合适。2）抗体的电荷来自多个组成部分。赖氨酸、精氨酸、组氨酸可带负电荷，天冬氨酸、谷氨酸、半胱氨酸可带正电荷，N-端的氨基可带正电荷，C-端的竣基可带负电荷，糖基化上唾液酸可带负电荷。
                  - heading "Q45. 阴离子交换层析" [level=2] [ref=f1e321]:
                    - link "Q45. 阴离子交换层析" [ref=f1e322] [cursor=pointer]:
                      - /url: "#q45-阴离子交换层析"
                  - generic [ref=f1e323]:
                    - paragraph [ref=f1e324]:
                      - generic [ref=f1e326]: 回答
                      - generic [ref=f1e327] [cursor=pointer]: BioCloudHub
                    - list [ref=f1e328]:
                      - listitem [ref=f1e329]:
                        - strong [ref=f1e330]: 阴离子交换剂带正电荷，与混合物中带负电的组分结合阴离子交换层析。常用的阴离子交换剂：
                        - text: 季铵（Q，强阴离子交换基团）和二乙氨乙基（DEAE，弱阴离子交换基团）。 在抗体纯化过程中，阴离子交换层析采用流穿模式进行，即将杂质结合在阴离子交换基团上，让蛋白流穿。由于通常 HCP、内毒、病毒、HCD 等带负电，故此步骤
                        - mark [ref=f1e331]: 可以
                        - text: 有效去除 HCP、内毒、病毒、HCD 等杂质。通常作为抗体纯化精纯步骤。
                      - listitem [ref=f1e332]:
                        - strong [ref=f1e333]: 补充知识：
                        - text: 1）蛋白是两性分子，具有等电点 pI。当缓冲液的 pH 值低于蛋白等电点 pI，蛋白带正电，选阳离子交换柱；当缓冲液的 pH 值高于蛋白等电点 pI，蛋白带负电，选阴离子交换柱。2）部分蛋白等电点低于 pH7，
                        - mark [ref=f1e334]: 可以
                        - text: 使用 Q 柱先做尝试，缓冲液使用 pH7。也
                        - mark [ref=f1e335]: 可以
                        - text: 选择离子交换试剂盒做摸索。
                  - heading "Q46. 离子交换层析的平衡和洗脱过程" [level=2] [ref=f1e336]:
                    - link "Q46. 离子交换层析的平衡和洗脱过程" [ref=f1e337] [cursor=pointer]:
                      - /url: "#q46-离子交换层析的平衡和洗脱过程"
                  - generic [ref=f1e338]:
                    - paragraph [ref=f1e339]:
                      - generic [ref=f1e341]: 回答
                      - generic [ref=f1e342] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e343]:
                      - text: 离子交换色谱的固定相首先用低离子强度的缓冲液平衡，然后将蛋白质样品用和平衡过程相同离子强度的缓冲液上样到固定相。结合的蛋白质在用更高离子强度或 pH 值不同的缓冲液洗脱前先淋洗一段时间。洗脱缓冲液中的抗衡离子与带电的固定相相互作用，取代了柱上的蛋白质。 在离子交换层析中，某些盐类代替结合蛋白和保持蛋白质稳定性的能力，可能比其他种类的盐可能更有效。NaCl 或 KCl 是洗脱液中最常用的盐类，其中 Na+或 K+是阳离子交换层析中的抗衡离子，Cl-是阴离子交换层析中的抗衡离子。另一方面，还
                      - mark [ref=f1e344]: 可以
                      - text: 通过调节缓冲液的 pH 值来减少蛋白质的电荷并破坏其与固定相之间的相互作用。对于结合到阳离子交换固定相上的蛋白质，增加缓冲液 pH 值会使蛋白质所带正电荷减少，因此可将其从柱上洗脱下来。对于结合到阴离子交换固定相上的蛋白质，降低 pH 值可减少蛋白质所带负电荷将其从柱上洗脱下来。详见《下游精纯工艺基本原理介绍》。
                  - heading "Q47. 细胞培养收获标准的法规要求" [level=2] [ref=f1e345]:
                    - link "Q47. 细胞培养收获标准的法规要求" [ref=f1e346] [cursor=pointer]:
                      - /url: "#q47-细胞培养收获标准的法规要求"
                  - generic [ref=f1e347]:
                    - paragraph [ref=f1e348]:
                      - generic [ref=f1e350]: 回答
                      - generic [ref=f1e351] [cursor=pointer]: BioCloudHub
                    - list [ref=f1e352]:
                      - listitem [ref=f1e353]:
                        - strong [ref=f1e354]: 《人用重组单克隆抗体制品总论》中规定了细胞培养收获的标准如下：
                        - text: “细胞培养和收获可采用限定细胞传代至与其稳定性相符的最高代次后，单次收获产物的方式；也可采用限定细胞培养时间连续传代培养并多次收获的方式。在整个培养过程中，两种方式均需监测细胞的生长状况，并根据生产系统的特点确定监测频率及检测指标。应根据生产过程中培养、增殖和表达量一致性的研究资料，确定终止培养、废弃培养物以及摒弃收获物的技术参数。每次收获后均应检测抗体含量、细菌内毒素及支原体。应根据生产过程及所用材料的特点，在合适的阶段进行常规或特定的外源病毒污染检查。除另有规定外，应对限定细胞传代次数的生产方式，采用适当的体外方法至少对 3 次收获物进行外源病毒检测。应明确进入下一步工艺的收获液接收标准，并与监测步骤关联。如检测到任何外源病毒，应停止收获并废弃同一细胞培养的前期收获液，追溯并确定污染的来源。”
                  - heading "Q48. 细胞培养收获指标" [level=2] [ref=f1e355]:
                    - link "Q48. 细胞培养收获指标" [ref=f1e356] [cursor=pointer]:
                      - /url: "#q48-细胞培养收获指标"
                  - generic [ref=f1e357]:
                    - paragraph [ref=f1e358]:
                      - generic [ref=f1e360]: 回答
                      - generic [ref=f1e361] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e362]: 通常为培养天数或者细胞活率两个指标。培养天数影响蛋白产量和质量，是关键工艺参数之一。对于 CHO 细胞的补料分批培养模式，行业内常用的培养天数为 14 天。收获细胞活率低通常会影响到蛋白的稳定性，也会影响到下游纯化过程，故通常会规定收获时的细胞活率大于某一数值，例如 70%或者 80%等。常规检测指标：产量、细胞活力、支原体、细胞密度等。
                  - heading "Q49. 细胞培养收获指标确定" [level=2] [ref=f1e363]:
                    - link "Q49. 细胞培养收获指标确定" [ref=f1e364] [cursor=pointer]:
                      - /url: "#q49-细胞培养收获指标确定"
                  - generic [ref=f1e365]:
                    - paragraph [ref=f1e366]:
                      - generic [ref=f1e368]: 回答
                      - generic [ref=f1e369] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e370]: 如 Q1033 问答，细胞培养收获指标通常为培养天数或者细胞活率。在 IND 阶段，可通过企业经验或者先验知识进行设定，对于 CHO 细胞的补料分批培养模式，行业内常用的培养天数为 14 天。收获时的细胞活率大于 70%或 80%等。BLA 申报阶段，由工艺表征研究确定培养天数和收获时的细胞活率。
                  - heading "Q50. 薄膜过滤法" [level=2] [ref=f1e371]:
                    - link "Q50. 薄膜过滤法" [ref=f1e372] [cursor=pointer]:
                      - /url: "#q50-薄膜过滤法"
                  - generic [ref=f1e373]:
                    - paragraph [ref=f1e374]:
                      - generic [ref=f1e376]: 回答
                      - generic [ref=f1e377] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f1e378]: 薄膜过滤法一般应采用封闭式薄膜过滤器，根据供试品及其溶剂的特性选择滤膜材质。无菌检查用的滤膜孔径应不大于 0.45μm 滤膜直径约为 50mm，若使用其他尺寸的滤膜，应对稀释液和冲洗液体积进行调整，并重新验证。使用时，应保证滤膜在过滤前后的完整性。水溶性供试液过滤前，一般应先将少量的冲洗液过滤，以润湿滤膜。油类供试品，其滤膜和过滤器在使用前应充分干燥。为发挥滤膜的最大过滤效率，应注意保持供试品溶液及冲洗液覆盖整个滤膜表面。供试液经薄膜过滤后，若需要用冲洗液冲洗滤膜，每张滤膜每次冲洗量一般为 100ml，总冲洗量一般不超过 500ml，最高不得超过 1000ml，以避免滤膜上的微生物受损伤。 膜过滤有助于对大体积样品实施检测，消除或至少能够减少具有抗菌特性的化合物的存在，并且可确保缓慢生长微生物的恢复。通过以保持生长为基础，该方法还可确保仅检测到活微生物，且结果可靠。这避免了对背景或噪声的过度关注，从而减少这些因素导致的误报。
