                  - heading "Q42. 什么是离子交换层析？" [level=2] [ref=f4e311]:
                    - link "Q42. 什么是离子交换层析？" [ref=f4e312] [cursor=pointer]:
                      - /url: "#q42-什么是离子交换层析"
                      - generic [ref=f4e313]:
                        - text: Q42. 什么是离子交换
                        - mark [ref=f4e314]: 层析
                        - text: ？
                  - generic [ref=f4e315]:
                    - paragraph [ref=f4e316]:
                      - generic [ref=f4e318]: 回答
                      - generic [ref=f4e319] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f4e320]:
                      - text: 离子交换
                      - mark [ref=f4e321]: 层析
                      - text: 分离蛋白的原理是基于其净电荷的不同，通过蛋白质与带电荷的固定相之间的静电作用力进行分离。IEX 有以下两类:（1）阴离子交换
                      - mark [ref=f4e322]: 层析
                      - text: （固定相带正电荷，与带负电的蛋白质相结合）；（2）阳离子交换
                      - mark [ref=f4e323]: 层析
                      - text: （固定相带负电，与带正电的蛋白质相结合）。离子交换
                      - mark [ref=f4e324]: 层析
                      - text: 常用于蛋白质纯化工艺中期。但是，对某些蛋白，在纯化工艺的前期或后期采用该方法亦可获得良好的分离效果。 由于氨基酸的基本结构和与其共价结合的修饰成分的影响，所有的蛋白质都会带有净电荷。由于溶剂可以与蛋白质相互交换氢离子，因此蛋白质的净电荷受其溶剂 pH 值的影响。蛋白质的等电点（pI）是蛋白质不带电时的 pH 值。当 pH 值高于 pI 时，蛋白质会带负电，而当 pH 值低于 pI 时，蛋白质带正电。因此，可以通过调节溶液的 pH 值来控制结合蛋白是与离子交换柱结合或是从柱上洗脱。
                  - heading "Q43. 离子交换层析在抗体药物生产中的应用" [level=2] [ref=f4e325]:
                    - link "Q43. 离子交换层析在抗体药物生产中的应用" [ref=f4e326] [cursor=pointer]:
                      - /url: "#q43-离子交换层析在抗体药物生产中的应用"
                      - generic [ref=f4e327]:
                        - text: Q43. 离子交换
                        - mark [ref=f4e328]: 层析
                        - text: 在抗体药物生产中的应用
                  - generic [ref=f4e329]:
                    - paragraph [ref=f4e330]:
                      - generic [ref=f4e332]: 回答
                      - generic [ref=f4e333] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f4e334]:
                      - text: 离子交换
                      - mark [ref=f4e335]: 层析
                      - text: 应用最为广泛，目标物质和带相反电荷的介质以静电力的作用结合，然后在用高离子或改变 pH 的方式进行洗脱。特别要注意，蛋白的 pI 表征的是蛋白表面的净电荷，然而离子交换
                      - mark [ref=f4e336]: 层析
                      - text: 时是蛋白的局部电荷和介质作用，另外离子交换介质吸附的一类物质，如阳离子交换介质吸附带正电荷的物质，所以在纯化过程中，需要配合
                      - mark [ref=f4e337]: 层析
                      - text: 过程进来合理的结合及洗脱过程，才能达到预期的结果。 阳离子交换是另一个较常用的抗体捕获方法。目前至少有 4 个（Humira、Synagis、Soliris、
                  - heading "Q44. 阳离子交换层析" [level=2] [ref=f4e338]:
                    - link "Q44. 阳离子交换层析" [ref=f4e339] [cursor=pointer]:
                      - /url: "#q44-阳离子交换层析"
                      - generic [ref=f4e340]:
                        - text: Q44. 阳离子交换
                        - mark [ref=f4e341]: 层析
                  - generic [ref=f4e342]:
                    - paragraph [ref=f4e343]:
                      - generic [ref=f4e345]: 回答
                      - generic [ref=f4e346] [cursor=pointer]: BioCloudHub
                    - list [ref=f4e347]:
                      - listitem [ref=f4e348]:
                        - strong [ref=f4e349]:
                          - text: 阳离子交换剂带负电荷，与混合物中带正电的组分结合阳离子交换
                          - mark [ref=f4e350]: 层析
                          - text: 。常用的阳离子交换剂：
                        - text: 磺酸甲酯（S，强阳离子交换基团）和羧甲基（CM，弱阳离子交换基团）。 在抗体纯化过程中，阳离子交换
                        - mark [ref=f4e351]: 层析
                        - text: 采用结合洗脱的方式进行，即将蛋白结合在阳离子交换基团上，让液体流穿。然后通过改变条件以改变电荷洗脱蛋白。可以有效去除 HCP、内毒、聚体等杂质。除了作为抗体纯化精纯步骤外，还可以作为捕获步骤。
                      - listitem [ref=f4e352]:
                        - strong [ref=f4e353]: 补充知识：
                        - text: 1）强离子交换基团的活性基团在很大的 pH 范围内均可保持带电，它可以在蛋白质结合所需 pH 值是特别强的酸性或碱性的情况下使用（假设该 pH 值下蛋白质稳定性仍得以保持）。有些蛋白质在弱离子交换上的保留较弱，使得它们可以用较低的离子强度洗脱。由于高离子强度会影响部分蛋白质的稳定性，而弱离子交换不需要在极端的 pH 值条件下进行蛋白质的结合，因此可能对蛋白质更合适。2）抗体的电荷来自多个组成部分。赖氨酸、精氨酸、组氨酸可带负电荷，天冬氨酸、谷氨酸、半胱氨酸可带正电荷，N-端的氨基可带正电荷，C-端的竣基可带负电荷，糖基化上唾液酸可带负电荷。
