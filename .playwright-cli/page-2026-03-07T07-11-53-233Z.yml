                    - list [ref=f4e363]:
                      - listitem [ref=f4e364]:
                        - strong [ref=f4e365]:
                          - text: 阴离子交换剂带正电荷，与混合物中带负电的组分结合阴离子交换
                          - mark [ref=f4e366]: 层析
                          - text: 。常用的阴离子交换剂：
                        - text: 季铵（Q，强阴离子交换基团）和二乙氨乙基（DEAE，弱阴离子交换基团）。 在抗体纯化过程中，阴离子交换
                        - mark [ref=f4e367]: 层析
                        - text: 采用流穿模式进行，即将杂质结合在阴离子交换基团上，让蛋白流穿。由于通常 HCP、内毒、病毒、HCD 等带负电，故此步骤可以有效去除 HCP、内毒、病毒、HCD 等杂质。通常作为抗体纯化精纯步骤。
                      - listitem [ref=f4e368]:
                        - strong [ref=f4e369]: 补充知识：
                        - text: 1）蛋白是两性分子，具有等电点 pI。当缓冲液的 pH 值低于蛋白等电点 pI，蛋白带正电，选阳离子交换柱；当缓冲液的 pH 值高于蛋白等电点 pI，蛋白带负电，选阴离子交换柱。2）部分蛋白等电点低于 pH7，可以使用 Q 柱先做尝试，缓冲液使用 pH7。也可以选择离子交换试剂盒做摸索。
                  - heading "Q46. 离子交换层析的平衡和洗脱过程" [level=2] [ref=f4e370]:
                    - link "Q46. 离子交换层析的平衡和洗脱过程" [ref=f4e371] [cursor=pointer]:
                      - /url: "#q46-离子交换层析的平衡和洗脱过程"
                      - generic [ref=f4e372]:
                        - text: Q46. 离子交换
                        - mark [ref=f4e373]: 层析
                        - text: 的平衡和洗脱过程
                  - generic [ref=f4e374]:
                    - paragraph [ref=f4e375]:
                      - generic [ref=f4e377]: 回答
                      - generic [ref=f4e378] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f4e379]:
                      - text: 离子交换色谱的固定相首先用低离子强度的缓冲液平衡，然后将蛋白质样品用和平衡过程相同离子强度的缓冲液上样到固定相。结合的蛋白质在用更高离子强度或 pH 值不同的缓冲液洗脱前先淋洗一段时间。洗脱缓冲液中的抗衡离子与带电的固定相相互作用，取代了柱上的蛋白质。 在离子交换
                      - mark [ref=f4e380]: 层析
                      - text: 中，某些盐类代替结合蛋白和保持蛋白质稳定性的能力，可能比其他种类的盐可能更有效。NaCl 或 KCl 是洗脱液中最常用的盐类，其中 Na+或 K+是阳离子交换
                      - mark [ref=f4e381]: 层析
                      - text: 中的抗衡离子，Cl-是阴离子交换
                      - mark [ref=f4e382]: 层析
                      - text: 中的抗衡离子。另一方面，还可以通过调节缓冲液的 pH 值来减少蛋白质的电荷并破坏其与固定相之间的相互作用。对于结合到阳离子交换固定相上的蛋白质，增加缓冲液 pH 值会使蛋白质所带正电荷减少，因此可将其从柱上洗脱下来。对于结合到阴离子交换固定相上的蛋白质，降低 pH 值可减少蛋白质所带负电荷将其从柱上洗脱下来。详见《下游精纯工艺基本原理介绍》。
                  - heading "Q47. 细胞培养收获标准的法规要求" [level=2] [ref=f4e383]:
                    - link "Q47. 细胞培养收获标准的法规要求" [ref=f4e384] [cursor=pointer]:
                      - /url: "#q47-细胞培养收获标准的法规要求"
                  - generic [ref=f4e385]:
                    - paragraph [ref=f4e386]:
                      - generic [ref=f4e388]: 回答
                      - generic [ref=f4e389] [cursor=pointer]: BioCloudHub
                    - list [ref=f4e390]:
                      - listitem [ref=f4e391]:
                        - strong [ref=f4e392]: 《人用重组单克隆抗体制品总论》中规定了细胞培养收获的标准如下：
                        - text: “细胞培养和收获可采用限定细胞传代至与其稳定性相符的最高代次后，单次收获产物的方式；也可采用限定细胞培养时间连续传代培养并多次收获的方式。在整个培养过程中，两种方式均需监测细胞的生长状况，并根据生产系统的特点确定监测频率及检测指标。应根据生产过程中培养、增殖和表达量一致性的研究资料，确定终止培养、废弃培养物以及摒弃收获物的技术参数。每次收获后均应检测抗体含量、细菌内毒素及支原体。应根据生产过程及所用材料的特点，在合适的阶段进行常规或特定的外源病毒污染检查。除另有规定外，应对限定细胞传代次数的生产方式，采用适当的体外方法至少对 3 次收获物进行外源病毒检测。应明确进入下一步工艺的收获液接收标准，并与监测步骤关联。如检测到任何外源病毒，应停止收获并废弃同一细胞培养的前期收获液，追溯并确定污染的来源。”
                  - heading "Q48. 细胞培养收获指标" [level=2] [ref=f4e393]:
                    - link "Q48. 细胞培养收获指标" [ref=f4e394] [cursor=pointer]:
                      - /url: "#q48-细胞培养收获指标"
                  - generic [ref=f4e395]:
                    - paragraph [ref=f4e396]:
                      - generic [ref=f4e398]: 回答
                      - generic [ref=f4e399] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f4e400]: 通常为培养天数或者细胞活率两个指标。培养天数影响蛋白产量和质量，是关键工艺参数之一。对于 CHO 细胞的补料分批培养模式，行业内常用的培养天数为 14 天。收获细胞活率低通常会影响到蛋白的稳定性，也会影响到下游纯化过程，故通常会规定收获时的细胞活率大于某一数值，例如 70%或者 80%等。常规检测指标：产量、细胞活力、支原体、细胞密度等。
                  - heading "Q49. 细胞培养收获指标确定" [level=2] [ref=f4e401]:
                    - link "Q49. 细胞培养收获指标确定" [ref=f4e402] [cursor=pointer]:
                      - /url: "#q49-细胞培养收获指标确定"
                  - generic [ref=f4e403]:
                    - paragraph [ref=f4e404]:
                      - generic [ref=f4e406]: 回答
                      - generic [ref=f4e407] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f4e408]: 如 Q1033 问答，细胞培养收获指标通常为培养天数或者细胞活率。在 IND 阶段，可通过企业经验或者先验知识进行设定，对于 CHO 细胞的补料分批培养模式，行业内常用的培养天数为 14 天。收获时的细胞活率大于 70%或 80%等。BLA 申报阶段，由工艺表征研究确定培养天数和收获时的细胞活率。
                  - heading "Q50. 薄膜过滤法" [level=2] [ref=f4e409]:
                    - link "Q50. 薄膜过滤法" [ref=f4e410] [cursor=pointer]:
                      - /url: "#q50-薄膜过滤法"
                  - generic [ref=f4e411]:
                    - paragraph [ref=f4e412]:
                      - generic [ref=f4e414]: 回答
                      - generic [ref=f4e415] [cursor=pointer]: BioCloudHub
                    - paragraph [ref=f4e416]: 薄膜过滤法一般应采用封闭式薄膜过滤器，根据供试品及其溶剂的特性选择滤膜材质。无菌检查用的滤膜孔径应不大于 0.45μm 滤膜直径约为 50mm，若使用其他尺寸的滤膜，应对稀释液和冲洗液体积进行调整，并重新验证。使用时，应保证滤膜在过滤前后的完整性。水溶性供试液过滤前，一般应先将少量的冲洗液过滤，以润湿滤膜。油类供试品，其滤膜和过滤器在使用前应充分干燥。为发挥滤膜的最大过滤效率，应注意保持供试品溶液及冲洗液覆盖整个滤膜表面。供试液经薄膜过滤后，若需要用冲洗液冲洗滤膜，每张滤膜每次冲洗量一般为 100ml，总冲洗量一般不超过 500ml，最高不得超过 1000ml，以避免滤膜上的微生物受损伤。 膜过滤有助于对大体积样品实施检测，消除或至少能够减少具有抗菌特性的化合物的存在，并且可确保缓慢生长微生物的恢复。通过以保持生长为基础，该方法还可确保仅检测到活微生物，且结果可靠。这避免了对背景或噪声的过度关注，从而减少这些因素导致的误报。
