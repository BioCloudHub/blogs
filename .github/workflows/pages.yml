name: Deploy Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cd docs
          npm install
          npm run docs:build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

      - uses: actions/deploy-pages@v4
