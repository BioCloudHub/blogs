<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- DNA-inspired helix structure -->
  <g fill="none" stroke="url(#grad1)" stroke-width="3">
    <!-- Left strand -->
    <path d="M35 10 Q20 25, 35 40 Q50 55, 35 70 Q20 85, 35 90" opacity="0.8"/>
    <!-- Right strand -->
    <path d="M65 10 Q80 25, 65 40 Q50 55, 65 70 Q80 85, 65 90" opacity="0.8"/>
    <!-- Base pairs connecting strands -->
    <line x1="35" y1="20" x2="65" y2="20" stroke="#64748b" stroke-width="2"/>
    <line x1="65" y1="30" x2="35" y2="30" stroke="#64748b" stroke-width="2"/>
    <line x1="35" y1="45" x2="65" y2="45" stroke="#64748b" stroke-width="2"/>
    <line x1="65" y1="55" x2="35" y2="55" stroke="#64748b" stroke-width="2"/>
    <line x1="35" y1="65" x2="65" y2="65" stroke="#64748b" stroke-width="2"/>
    <line x1="65" y1="80" x2="35" y2="80" stroke="#64748b" stroke-width="2"/>
  </g>

  <!-- Cloud icon at top -->
  <g fill="none" stroke="#0284c7" stroke-width="2">
    <path d="M75 20 Q70 20, 70 15 Q70 10, 75 10 Q78 10, 80 12 Q82 10, 85 10 Q90 10, 90 15 Q90 20, 85 20 Q82 20, 80 18"/>
    <line x1="80" y1="20" x2="80" y2="30"/>
  </g>
</svg>
